# Build config Cloud Build pour le frontend Next.js — pattern symétrique aux workers.
# Soumettre depuis la RACINE du monorepo (frontend/ doit être dans le contexte) :
#   gcloud builds submit . --config=frontend/cloudbuild.yaml \
#     --substitutions=_SHORT_SHA=$(git rev-parse --short HEAD),_API_BASE_URL=https://prt-prod-backend-y5iagyfila-ew.a.run.app \
#     --project=price-tracker-prod-01
#
# Le `--build-arg NEXT_PUBLIC_API_BASE_URL=...` est CRUCIAL : Next.js inline les
# `NEXT_PUBLIC_*` dans le bundle JS au moment de `next build`. Sans ça le client
# tentera de fetch sur `""` et tout échouera côté navigateur.

steps:
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-f'
      - 'frontend/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_BASE_URL=${_API_BASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEMO_BEARER=${_DEMO_BEARER}'
      - '-t'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/prt-prod-docker/frontend:${_SHORT_SHA}'
      - '.'

  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/prt-prod-docker/frontend:${_SHORT_SHA}'

images:
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/prt-prod-docker/frontend:${_SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8' # next build est CPU-bound, accélère ~3×

substitutions:
  _SHORT_SHA: 'latest'
  _API_BASE_URL: 'https://prt-prod-backend-y5iagyfila-ew.a.run.app'
  _DEMO_BEARER: 'demo'
