# FICHIER : transform/dbt_project.yml
# RÔLE    : Configuration principale du projet dbt
#
# dbt (data build tool) est l'outil qui transforme les données brutes
# en tables propres et structurées (notre modèle en étoile).
# Il génère du SQL automatiquement à partir de fichiers .sql + .yml

name: "pricetracker"
version: "1.0.0"

# Indique à dbt où se trouvent les fichiers de modèles
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]    # pour les petits fichiers CSV de référence (ex: liste devises)

# Profil de connexion défini dans ~/.dbt/profiles.yml
profile: "pricetracker"

# Configuration des modèles par dossier
# "materialized" = comment dbt crée la table en base :
#   - view = vue SQL recalculée à chaque requête (légère, à jour)
#   - table = table physique stockée (rapide à lire, recalculée lors du dbt run)
#   - incremental = n'ajoute que les nouvelles lignes (optimal pour les gros volumes)
models:
  pricetracker:
    dim:
      +materialized: table        # les dimensions changent peu → table fixe
      +schema: dimensions
    fact:
      +materialized: incremental  # les faits grossissent chaque jour → incrémental
      +schema: facts
    mart:
      +materialized: view         # les marts sont des vues analytiques → recalculées
      +schema: analytics